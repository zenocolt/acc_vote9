name: CD (Render)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: cd-render-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run lint

      - name: Build app
        run: npm run build

      - name: Trigger Render deploy hook
        if: ${{ secrets.RENDER_DEPLOY_HOOK_URL != '' }}
        run: |
          curl --fail --show-error --silent \
            -X POST "$RENDER_DEPLOY_HOOK_URL"
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}

      - name: Health check after deploy
        if: ${{ secrets.RENDER_DEPLOY_HOOK_URL != '' && secrets.RENDER_HEALTHCHECK_URL != '' }}
        run: |
          echo "Checking service health at $RENDER_HEALTHCHECK_URL"
          for attempt in $(seq 1 30); do
            if curl --fail --show-error --silent "$RENDER_HEALTHCHECK_URL" > /dev/null; then
              echo "Health check passed on attempt $attempt"
              exit 0
            fi
            echo "Attempt $attempt failed. Waiting 10 seconds before retry..."
            sleep 10
          done
          echo "Health check failed after multiple retries."
          exit 1
        env:
          RENDER_HEALTHCHECK_URL: ${{ secrets.RENDER_HEALTHCHECK_URL }}

      - name: Skip health check (secret missing)
        if: ${{ secrets.RENDER_DEPLOY_HOOK_URL != '' && secrets.RENDER_HEALTHCHECK_URL == '' }}
        run: echo "RENDER_HEALTHCHECK_URL is not configured. Deploy was triggered, health check skipped."

      - name: Skip deploy (secret missing)
        if: ${{ secrets.RENDER_DEPLOY_HOOK_URL == '' }}
        run: echo "RENDER_DEPLOY_HOOK_URL is not configured. Build checks passed, deploy skipped."
